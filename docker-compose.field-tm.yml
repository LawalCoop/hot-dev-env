networks:
  hotosm:
    name: hotosm-dev
    external: true

services:
  proxy:
    networks:
      - ftm-net
      - hotosm
    environment:
      # Add field.hotosm.test so BunkerWeb serves the UI via Traefik
      SERVER_NAME: field.localhost odk.field.localhost qfield.field.localhost mail.field.localhost field.hotosm.test
      field.hotosm.test_REVERSE_PROXY_HOST: http://api:8000
      field.hotosm.test_MAX_CLIENT_SIZE: 1G
      field.hotosm.test_REVERSE_PROXY_INTERCEPT_ERRORS: "no"
      field.hotosm.test_REVERSE_PROXY_READ_TIMEOUT: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.field-tm.rule=Host(`field.hotosm.test`)"
      - "traefik.http.routers.field-tm.entrypoints=websecure"
      - "traefik.http.routers.field-tm.tls=true"
      - "traefik.http.services.field-tm.loadbalancer.server.port=8080"
      - "traefik.docker.network=hotosm-dev"

  api:
    networks:
      - ftm-net
      - hotosm
    environment:
      FTM_DOMAIN: field.hotosm.test
      # Use the shared Hanko from hot-dev-env (hotosm-dev network).
      # HANKO_API_URL   – backend → Hanko (internal Docker network)
      # HANKO_PUBLIC_URL – browser → Hanko (via Traefik)
      # LOGIN_URL        – where the sign-in button redirects the browser
      # FTM_DEV_PORT must be empty: the host .env may have FTM_DEV_PORT=7050
      # (localhost dev), but field.hotosm.test runs behind Traefik on HTTPS —
      # no port suffix in the redirect-after-login URL.
      FTM_DEV_PORT: ""
      HANKO_API_URL: http://hanko:8000
      HANKO_PUBLIC_URL: https://login.hotosm.test
      # JWT_ISSUER must match the `iss` claim in Hanko's tokens, which is the
      # PUBLIC URL (https://login.hotosm.test), not the internal Docker URL.
      # Without this, HANKO_API_URL is used as the issuer and validation fails.
      JWT_ISSUER: https://login.hotosm.test
      LOGIN_URL: https://login.hotosm.test/app
